<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - PANDA BYTZS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .choco-shadow {
      box-shadow: 0 8px 32px 0 rgba(135, 73, 43, 0.18), 0 1.5px 3px 0 #f8e3c8;
    }
    .back-btn {
      margin-bottom: 12px;
      display: inline-flex;
      align-items: center;
      background: linear-gradient(90deg,#c49062 60%, #f8e3c8 100%);
      color: #6a4e42;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 9999px;
      padding: 8px 18px;
      cursor: pointer;
      transition: box-shadow 0.18s, background 0.18s;
      box-shadow: 0 2px 10px #c4906255;
    }
    .back-btn:hover {
      background: linear-gradient(90deg,#6a4e42 60%, #f8e3c8 100%);
      color: #fff;
    }
    .choco-border {
      border: 2px solid #c49062;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#f8e3c8] via-[#ffe5c8] to-[#c49062] min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-3xl choco-shadow p-10 w-full max-w-sm relative">

    <button class="back-btn absolute top-4 left-4" onclick="goBack()">
      &#8592; Back
    </button>

    <div class="flex flex-col items-center mb-6 mt-4">
      <span class="inline-block bg-gradient-to-tr from-[#c49062] to-[#fff4e0] p-2 rounded-full choco-shadow mb-2">
        <img src="./assets/image.jpg" alt="PANDA BYTZS Logo" class="h-20 w-20 rounded-full border-4 choco-border shadow-lg">
      </span>
      <h1 class="text-3xl font-black text-[#6a4e42] drop-shadow-xl mb-1">Login</h1>
      <span class="text-[#c49062] font-semibold text-sm">Your mini-choco cone destination</span>
    </div>

    <form action="home.html" method="POST" class="space-y-5 mt-2">
      <div>
        <label for="email" class="block text-sm font-semibold text-[#6a4e42] mb-1">Email</label>
        <input type="email" id="email" name="email" required
               class="w-full px-4 py-2 border choco-border rounded-xl focus:outline-none focus:ring-2 focus:ring-[#c49062] transition">
      </div>

      <div>
        <label for="password" class="block text-sm font-semibold text-[#6a4e42] mb-1">Password</label>
        <input type="password" id="password" name="password" required
               class="w-full px-4 py-2 border choco-border rounded-xl focus:outline-none focus:ring-2 focus:ring-[#c49062] transition">
      </div>

      <button type="submit"
              class="w-full bg-gradient-to-tr from-[#c49062] to-[#ffe5c8] hover:from-[#6a4e42] hover:to-[#c49062] text-white font-bold py-2 rounded-xl transition shadow-lg">
        Sign In
      </button>
    </form>

    <p class="text-center text-sm text-[#6a4e42] mt-6">
      Don't have an account?
      <a href="signup.html" class="text-pink-500 font-semibold hover:underline">Sign Up</a>
    </p>
  </div>

  <script>
    function goBack() {
      window.history.length > 1 ? window.history.back() : window.location.href = "index.html";
    }
  </script>
</body>
</html>
